<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poll Form</title>
    <link rel="stylesheet" href="styles/poll-form.css">
</head>
<header>
    <h1>Poll Form</h1>
</header>

<body>
    <main>
        <form>
            <fieldset>
                <legend>Contact Information</legend>
                <div class="form-item column2">
                    <label for="fullname">Enter your full name:</label>
                    <input type="text" id="fullname" name="fullname">
                </div>
                <div class="form-item column2">
                    <label for="useremail">Enter your email:</label>
                    <input type="email" id="useremail" name="useremail">
                </div>
            </fieldset>
            <!-- <fieldset> This is called the "implicit method" accord to the instructions as another option.
                <legend>Contact Information</legend>
                <label>Full Name: <input type="text" name="fullname"></label>
                <label>Email: <input type="email" name="useremail"></label>
            </fieldset> -->
        </form>
        <form>
            <fieldset>
                <legend>Questions</legend>
                <div class="form-item column1">
                    <label for="browser">What is your favorite browser?</label>
                    <select id="browser" name="browser">
                        <option selected value="chrome">Chrome</option>
                        <option value="firefox">Firefox</option>
                        <option value="edge">Edge</option>
                    </select>
                </div>
                <div class="form-item column1">
                    <label for="pet">Do you have a household pet?</label>
                    <input type="checkbox" id="pet" name="pet">
                </div>
                <label for="feedback">List the places you have lived:</label>
                <textarea id="feedback" name="feedback" rows="4"
                    placeholder="Tokyo Japan, Dublin Ireland, London UK, Seoul South Korea"></textarea>
            </fieldset>
            <button type="submit">Submit Poll</button>
        </form>

    </main>
</body>
<footer>
    <p>&copy; W05 Learning Activity: HTML Forms &#10070; 2025 &#10070; Corbin Long &#10070; Texas, USA </p>
</footer>

</html>
