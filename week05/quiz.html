<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poll Form</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>
<header>
    <h1>All Hallows Quiz</h1>
</header>

<body>
    <main>
        <form>
            <label for="q1">1. What is the name "Halloween" a contraction of?</label>
            <input type="text" id="q1" name="q1">
            <label for="q2">2. What is the difference between All Saints Day and All Souls Day?</label>
            <textarea id="q2" name="q2">
            </textarea>
            <label for="q3">3. What is the name of the ancient Celtic holiday which Halloween was created from?</label>
            <select id="q3" name="q3">
                <option selected value="selecttheanswer">Select the answer:</option>
                <option value="samhain">Samhain</option>
                <option value="allhallowseve">All Hallows Eve</option>
                <option value="diadelosmuertos">Día de los Muertos</option>
            </select>
            <label for="q4">4. How much money (in billions) did Americans spend on Halloween in 2024? Round to the
                nearest number.</label>
            <input type="number" id="q4" name="q4">
            <button type="submit">Submit Quiz</button>
        </form>
    </main>
</body>
